<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Listado</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/vistas/vista-listado/styles-listado.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="container listado-container">

    <nav class="nav-vistas">
      <a href="/index.html" class="nav-link" id="nav-principal">👤 Principal</a>
      <a href="/vistas/vistas-cards/index.html" class="nav-link" id="nav-cards">⊞ Cards</a>
      <a href="/vistas/vista-listado/index.html" class="nav-link" id="nav-listado">☰ Listado</a>
    </nav>

    <div class="galeria-controls">

      <div id="search-container" class="search-container">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Buscar por nombre o correo..."
          oninput="handleSearchListado(event)"
          autocomplete="off"
        />
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>

      <div class="cantidad-wrap">
        <label for="cantidad-input" class="cantidad-label">Usuarios</label>
        <input
          type="number"
          id="cantidad-input"
          class="cantidad-input"
          value="10"
          min="1"
        />
      </div>

    </div>

    <div class="listado-wrap">
      <table class="listado-table">
        <thead>
        <tr>
          <th>Avatar</th>
          <th>Nombre</th>
          <th>Dirección</th>
          <th>Correo</th>
          <th>Teléfono</th>
        </tr>
      </thead>
        <tbody id="listado-body">
          <tr>
            <td colspan="6" class="listado-empty">Cargando...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <button class="reload-btn" id="btn-listado" onclick="loadListado()">
      <span class="icon" id="icon-listado">↻</span> Nuevos usuarios
    </button>

  </div>

  <script src="/vistas/vista-listado/listados.js"></script>
</body>
</html>
