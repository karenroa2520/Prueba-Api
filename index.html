<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <nav class="nav-vistas">
      <a href="/index.html" class="nav-link" id="nav-principal">👤 Principal</a>
      <a href="/vistas/vistas-cards/index.html" class="nav-link" id="nav-cards">⊞ Cards</a>
      <a href="/vistas/vista-listado/vista-listado.html" class="nav-link" id="nav-listado">☰ Listado</a>
    </nav>

    <div id="search-container" class="search-container">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="Buscar por nombre o correo..."
        oninput="handleSearch(event)"
        autocomplete="off"
      />
      <div id="search-dropdown" class="search-dropdown"></div>
    </div>

    <div class="card">
      <div class="wrapper">
        <div class="avatar-wrap" id="avatar-wrap"></div>
        <div class="header-info">
          <p class="name" id="name">Cargando...</p>
          <span class="badge" id="gender-badge"></span>
        </div>
      </div>

      <div class="fields">
        <div class="row">
          <span class="label">Direccion</span>
          <span class="value" id="city"></span>
        </div>
        <div class="row">
          <span class="label">Correo</span>
          <span class="value" id="email"></span>
        </div>
        <div class="row">
          <span class="label">Celular</span>
          <span class="value" id="phone"></span>
        </div>
      </div>

      <button class="reload-btn" id="btn" onclick="loadUser()">
        <span class="icon" id="icon">↻</span> Nuevo usuario
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
